name: Deploy Peekori Printer Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "frontend/.next/" \
            --exclude "frontend/node_modules/" \
            --exclude "backend/venv/" \
            --exclude "__pycache__/" \
            --exclude "*.pyc" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/peekori/peekori-printer-portal/"

      - name: Build and restart services on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd /srv/peekori/peekori-printer-portal/backend
            python3 -m venv venv
            . venv/bin/activate
            pip install -r requirements.txt
            cd /srv/peekori/peekori-printer-portal/frontend
            npm ci
            npm run build
            systemctl restart peekori-printer-backend peekori-printer-frontend
            systemctl is-active peekori-printer-backend
            systemctl is-active peekori-printer-frontend
          '
